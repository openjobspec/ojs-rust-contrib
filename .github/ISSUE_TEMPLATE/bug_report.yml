name: Bug Report
description: Report a reproducible bug in ojs-rust-contrib
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in **ojs-rust-contrib**.
        Please fill in the sections below so we can reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages, stack traces, or logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g., v0.3.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, related backend versions, etc.
    validations:
      required: false
